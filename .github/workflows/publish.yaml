name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: uxiew/action-setup-node-pnpm@main
        with:
          node-version: "24"
          args: "--frozen-lockfile"

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  publish-npm:
    name: Publish Packages
    needs: verify
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js + pnpm
        uses: uxiew/action-setup-node-pnpm@main
        with:
          node-version: "24"
          args: "--frozen-lockfile"
          registry-url: "https://registry.npmjs.org"

      - name: Build
        run: pnpm build

      - name: Publish
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks

      - name: Skip publish (missing NPM_TOKEN)
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN is empty, skip npm publish."
